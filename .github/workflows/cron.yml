name: Movie Daily Archive
on:
  schedule:
    - cron: '0 17 * * *' # 00:00 AM giờ VN
  workflow_dispatch: 
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node fetch_movies.js
      - run: |
          git config --global user.name "Movie-Bot"
          git config --global user.email "actions@github.com"
          git add data/*.json
          git commit -m "Update $(date +'%Y-%m-%d')" || exit 0
          git push
